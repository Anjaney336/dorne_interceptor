name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-lint-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint (syntax and runtime-critical checks)
        run: |
          ruff check src scripts tests --select E9,F63,F7,F82

      - name: Validate manifests
        run: |
          python scripts/validate_repo_manifests.py

      - name: Pytest smoke suite
        run: |
          pytest -q tests/test_smoke.py tests/test_airsim_connection.py tests/test_constraints.py
